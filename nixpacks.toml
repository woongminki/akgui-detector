[phases.setup]
nixPkgs = ["nodejs_20"]
nixLibs = []
nixOverlays = []
aptPkgs = []

[phases.install]
cmds = ["npm install -g pnpm", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @evil-spirit/shared build", "pnpm --filter @evil-spirit/api build"]

[start]
cmd = "pnpm --filter @evil-spirit/api start"
